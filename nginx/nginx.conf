# FieldTrack Nginx — reverse proxy for FastAPI + static admin web build.
# DECISIONS:
# - /api/* proxies to the app container; everything else serves the (future)
#   admin SPA from /var/www/static with index.html fallback.
# - Rate limiting here is a coarse network-level guard (per-IP). Fine-grained
#   per-user limits live in Redis inside the app.
# - client_max_body_size 10m — profile photos; tune if needed.
# - TLS intentionally not configured yet: terminate with certbot/Let's Encrypt
#   on the VPS when a domain exists (add a 443 server block then).

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;

    # Gzip JSON responses (location history payloads compress well)
    gzip on;
    gzip_types application/json text/css application/javascript;
    gzip_min_length 1024;

    # Coarse per-IP rate limit: 30 req/s burst 60 — mobile sync bursts fit.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # WebSocket upgrade support (admin live dashboard at /api/v1/ws/...).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream fastapi {
        server app:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 10m;

        # Container healthcheck endpoint
        location = /nginx-health {
            access_log off;
            return 200 "ok";
        }

        # WebSocket endpoints — must come before the general /api/ block so
        # the Upgrade/Connection headers are preserved (the block below
        # clears Connection, which breaks the ws handshake).
        # NOTE: the path is /api/v1/ws/ (API_V1_PREFIX = /api/v1). The previous
        # /api/ws/ never matched the real endpoint (/api/v1/ws/admin-live), so
        # the upgrade fell through to the generic /api/ block below — which sets
        # `Connection ""` and breaks the handshake → the dashboard sat on
        # "Reconnecting…" forever while plain REST kept working.
        location /api/v1/ws/ {
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout 3600s;
        }

        location /api/ {
            limit_req zone=api_limit burst=60 nodelay;

            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        # Future admin web build (SPA)
        location / {
            root /var/www/static;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Cache hashed static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|svg|woff2?)$ {
            root /var/www/static;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
