# FieldTrack — PRODUCTION Nginx config.
#
# Replace every "your-domain.com" with your real domain before deploying.
# Pairs with docker-compose.prod.yml (mounted read-only at /etc/nginx/nginx.conf)
# and scripts/ssl_setup.sh (which obtains the certs referenced below).
#
# Layout:
#   - Port 80: redirects everything to https, EXCEPT the certbot ACME
#     challenge path (needed for certificate renewal).
#   - Port 443: TLS termination, reverse proxy to FastAPI, WebSocket proxy,
#     and static SPA hosting for the admin dashboard.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/html application/json text/css application/javascript;

    # ── Rate limiting ────────────────────────────────────────────────────
    # Login/refresh/logout endpoints are the most attractive brute-force
    # target. 30 requests/minute per IP, burst 10 (queued, not dropped
    # outright), and a 429 (not the default 503) so clients can distinguish
    # "you're being throttled" from "server is down".
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=30r/m;
    limit_req_status 429;

    # WebSocket upgrade support.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream fastapi {
        server app:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────
    # NOTE: certbot uses the --standalone authenticator (see
    # scripts/ssl_setup.sh), which briefly stops this whole Nginx container
    # and binds port 80 itself during issuance/renewal — so no ACME webroot
    # location is needed here.
    server {
        listen 80;
        server_name your-domain.com www.your-domain.com;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name your-domain.com www.your-domain.com;

        client_max_body_size 10m;

        # ── SSL (Let's Encrypt via certbot) ─────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security headers ────────────────────────────────────────────
        # X-Frame-Options / frame-ancestors: the admin dashboard must never be
        # iframed by another site (clickjacking).
        add_header X-Frame-Options "DENY" always;
        # Legacy XSS filter — harmless to keep for older browsers.
        add_header X-XSS-Protection "1; mode=block" always;
        # Stop browsers guessing content-types (e.g. treating a JSON
        # response as executable HTML).
        add_header X-Content-Type-Options "nosniff" always;
        # HSTS: once a browser has loaded this over https, never let it try
        # plain http again for a year. includeSubDomains covers www too.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # Don't leak the full referrer URL (which can contain tokens/paths)
        # to third-party origins.
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Content-Security-Policy — locks down where the SPA can load
        # scripts/styles/images/connect from:
        #   - default-src 'self': everything same-origin unless overridden below
        #   - script-src/style-src 'self' 'unsafe-inline': Vite's production
        #     build inlines a small bootstrap script + Tailwind styles
        #   - img-src: allow OpenStreetMap tiles for the Leaflet maps
        #   - connect-src: allow XHR/fetch to our own API plus the secure
        #     WebSocket for the live admin dashboard
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://tile.openstreetmap.org; font-src 'self' data:; connect-src 'self' wss://your-domain.com; frame-ancestors 'none'" always;

        # Container healthcheck endpoint (no logging noise).
        location = /nginx-health {
            access_log off;
            return 200 "ok";
        }

        # ── WebSocket: admin live dashboard ─────────────────────────────
        # Must come before the general /api/ block — the Upgrade/Connection
        # headers here are required for the handshake, and the generic proxy
        # block below does not set them.
        location /api/v1/ws/ {
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout 3600s;
        }

        # ── Auth endpoints: rate-limited ────────────────────────────────
        # Matches /api/v1/auth/login, /refresh, /logout etc (API_V1_PREFIX).
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;

            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── API reverse proxy ───────────────────────────────────────────
        location /api/ {
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        # ── Monitoring (monitoring/docker-compose.monitoring.yml) ───────
        # Uptime Kuma status page — public-friendly status page for the app.
        location /status/ {
            proxy_pass http://uptime-kuma:3001/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Grafana dashboards — protect with Grafana's own login (admin
        # password set via GF_SECURITY_ADMIN_PASSWORD). Consider adding
        # `allow`/`deny` IP restrictions here if Grafana is admin-only.
        location /grafana/ {
            proxy_pass http://grafana:3000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Admin SPA (React/Vite build) ────────────────────────────────
        root /var/www/admin;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Long-cache hashed static assets (Vite fingerprints filenames, so a
        # new deploy gets a new filename — safe to cache forever).
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
