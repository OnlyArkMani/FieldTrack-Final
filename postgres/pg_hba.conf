# FieldTrack production pg_hba.conf
#
# Postgres has NO published ports in docker-compose.prod.yml, so the only
# clients that can ever reach this socket are other containers on the
# `fieldtrack_network` bridge (the `app` service) and Postgres itself
# (local Unix socket, used by the postgis/postgis entrypoint scripts).
#
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local Unix socket — image init scripts, `docker exec ... psql`.
local   all             all                                     trust

# Loopback inside the container (healthcheck uses pg_isready over TCP).
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# The Docker bridge network. Compose's default bridge subnets are in
# 172.16.0.0/12 — this covers every possible fieldtrack_network subnet
# without needing to hardcode the exact one Docker assigns.
host    all             all             172.16.0.0/12           scram-sha-256
